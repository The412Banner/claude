name: Build Claude APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Generate testkey keystore
        run: |
          keytool -genkeypair \
            -alias claudekey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore keystore.jks \
            -storepass testkey \
            -keypass testkey \
            -dname "CN=Claude, OU=The412Banner, O=The412Banner, L=US, ST=US, C=US"

      - name: Build release APK
        env:
          KEYSTORE_PASS: testkey
          KEY_PASS: testkey
        run: ./gradlew assembleRelease

      - name: Sign APK (V1 + V2 + V3)
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:testkey \
            --key-pass pass:testkey \
            --ks-key-alias claudekey \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out Claude-${{ github.ref_name }}.apk \
            $APK

      - name: Verify signature
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify \
            --verbose Claude-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Claude-${{ github.ref_name }}
          path: Claude-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Claude-${{ github.ref_name }}.apk
          generate_release_notes: false
          body: |
            ## Claude ${{ github.ref_name }}

            Native Android wrapper for Claude CLI via Termux bridge.

            ### Requirements
            - Termux installed
            - Claude CLI installed in Termux: `npm install -g @anthropic-ai/claude-code`
            - Python 3 in Termux: `pkg install python`

            ### Setup
            1. Install the APK
            2. Enter your Anthropic API key
            3. Tap **Install Bridge Script**
            4. Tap **Launch Claude**
